<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — NoteVault</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<nav>
  <a href="index.html" class="nav-logo"><div class="logo-mark">📚</div>NoteVault</a>
  <div class="nav-links">
    <a href="dashboard.html">Browse Notes</a>
    <a href="login.html" class="btn-ng">Sign In</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h1>Create account</h1>
    <p class="auth-sub">Join NoteVault and start sharing study notes.</p>

    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="e.g. alex123" autocomplete="username" />
    </div>
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@email.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min. 6 characters" autocomplete="new-password" />
    </div>

    <button class="btn-form" id="submitBtn" onclick="register()">Create account →</button>

    <div class="divider"></div>
    <div class="auth-footer">Already have an account? <a href="login.html">Sign in</a></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="script.js"></script>
<script>
  async function register() {
    const username = document.getElementById('username').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!username || !email || !password) return showToast('Please fill in all fields.', 'error');

    const btn = document.getElementById('submitBtn');
    btn.textContent = 'Creating account…'; btn.disabled = true;

    try {
      const res  = await fetch('/api/users/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username,email,password}) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      showToast('Account created! Redirecting…');
      setTimeout(() => window.location.href = 'dashboard.html', 1400);
    } catch(err) {
      showToast(err.message || 'Registration failed.', 'error');
      btn.textContent = 'Create account →'; btn.disabled = false;
    }
  }
  document.addEventListener('keydown', e => { if(e.key==='Enter') register(); });
</script>
</body>
</html>
