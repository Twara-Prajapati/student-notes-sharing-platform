<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — NoteVault</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<nav>
  <a href="index.html" class="nav-logo"><div class="logo-mark">📚</div>NoteVault</a>
  <div class="nav-links">
    <a href="dashboard.html">Browse Notes</a>
    <a href="register.html" class="btn-np">Register →</a>
  </div>
</nav>

<div class="auth-page">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="auth-sub">Sign in to upload and manage your notes.</p>

    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="email" placeholder="you@email.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password" />
    </div>

    <button class="btn-form" id="submitBtn" onclick="login()">Sign in →</button>

    <div class="divider"></div>
    <div class="auth-footer">No account yet? <a href="register.html">Register for free</a></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="script.js"></script>
<script>
  if (localStorage.getItem('token')) window.location.href = 'dashboard.html';

  async function login() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) return showToast('Please fill in all fields.', 'error');

    const btn = document.getElementById('submitBtn');
    btn.textContent = 'Signing in…'; btn.disabled = true;

    try {
      const res  = await fetch('/api/users/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({email,password}) });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      showToast(`Welcome back, ${data.user.username}!`);
      setTimeout(() => window.location.href = 'dashboard.html', 1200);
    } catch(err) {
      showToast(err.message || 'Login failed.', 'error');
      btn.textContent = 'Sign in →'; btn.disabled = false;
    }
  }
  document.addEventListener('keydown', e => { if(e.key==='Enter') login(); });
</script>
</body>
</html>
