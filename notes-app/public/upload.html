<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Note — NoteVault</title>
  <link rel="stylesheet" href="theme.css" />
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<nav>
  <a href="index.html" class="nav-logo"><div class="logo-mark">📚</div>NoteVault</a>
  <div class="nav-links">
    <a href="dashboard.html">Browse</a>
    <a href="upload.html" class="nav-active">Upload</a>
    <a href="#" id="nav-logout" onclick="logout()" style="display:none">Sign out</a>
    <a href="login.html" id="nav-login" class="btn-ng">Sign In</a>
    <a href="register.html" id="nav-register" class="btn-np">Register →</a>
  </div>
</nav>

<div class="auth-page" style="align-items:flex-start; padding-top: calc(var(--nav-h) + 48px);">
  <div class="auth-card" style="max-width:500px;">
    <h1>Upload a note</h1>
    <p class="auth-sub">Share your notes with other students.</p>

    <div class="form-group">
      <label>Note title</label>
      <input type="text" id="title" placeholder="e.g. Chapter 5 – Organic Chemistry" />
    </div>

    <div class="form-group">
      <label>Subject</label>
      <select id="subject">
        <option value="" disabled selected>Select a subject…</option>
        <optgroup label="Science">
          <option>Mathematics</option>
          <option>Physics</option>
          <option>Chemistry</option>
          <option>Biology</option>
          <option>Computer Science</option>
        </optgroup>
        <optgroup label="Humanities">
          <option>History</option>
          <option>Geography</option>
          <option>Economics</option>
          <option>Psychology</option>
          <option>Philosophy</option>
        </optgroup>
        <optgroup label="Language">
          <option>English</option>
          <option>Literature</option>
        </optgroup>
        <option>Other</option>
      </select>
    </div>

    <div class="form-group">
      <label>File</label>
      <div class="file-drop" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.ppt,.pptx,.txt" onchange="fileSelected(this)" />
        <div class="drop-icon">📄</div>
        <p><strong>Click to browse</strong> or drag & drop</p>
        <p id="fileChosen" class="file-chosen"></p>
      </div>
      <p class="field-hint">PDF, DOC, DOCX, PPT, PPTX, TXT · Max 10 MB</p>
    </div>

    <div class="progress-bar" id="progressBar">
      <div class="progress-bar-inner" id="progressInner"></div>
    </div>

    <button class="btn-form" id="submitBtn" onclick="uploadNote()">Upload note →</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="script.js"></script>
<script>
  if (!localStorage.getItem('token')) window.location.href = 'login.html';

  function fileSelected(input) {
    const file = input.files[0];
    if (!file) return;
    document.getElementById('fileChosen').textContent = '✓ ' + file.name;
    document.getElementById('dropZone').classList.add('has-file');
  }

  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); });
  dz.addEventListener('drop', e => {
    e.preventDefault();
    const fi = document.getElementById('fileInput');
    fi.files = e.dataTransfer.files;
    fileSelected(fi);
  });

  async function uploadNote() {
    const title   = document.getElementById('title').value.trim();
    const subject = document.getElementById('subject').value;
    const file    = document.getElementById('fileInput').files[0];
    if (!title)   return showToast('Please enter a title.', 'error');
    if (!subject) return showToast('Please select a subject.', 'error');
    if (!file)    return showToast('Please choose a file.', 'error');

    const formData = new FormData();
    formData.append('title', title);
    formData.append('subject', subject);
    formData.append('file', file);

    const btn = document.getElementById('submitBtn');
    btn.textContent = 'Uploading…'; btn.disabled = true;

    const bar = document.getElementById('progressBar');
    const inner = document.getElementById('progressInner');
    bar.style.display = 'block';
    let pct = 0;
    const tick = setInterval(() => { pct = Math.min(pct + 7, 85); inner.style.width = pct + '%'; }, 150);

    try {
      const res  = await fetch('/api/notes/upload', { method:'POST', headers:{Authorization:`Bearer ${localStorage.getItem('token')}`}, body: formData });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message);
      clearInterval(tick); inner.style.width = '100%';
      showToast('Note uploaded successfully!');
      setTimeout(() => window.location.href = 'dashboard.html', 1400);
    } catch(err) {
      clearInterval(tick); bar.style.display = 'none';
      showToast(err.message || 'Upload failed.', 'error');
      btn.textContent = 'Upload note →'; btn.disabled = false;
    }
  }
</script>
</body>
</html>
